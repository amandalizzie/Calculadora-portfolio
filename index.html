<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora | Feito por Amanda Elizabeth Silva Cruz</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <button id="trocarTema" class="botao-tema">🌓</button>

    <div class="calculadora">
        <div class="historico" id="historico"></div>
        <div class="tela" id="tela">0</div>

        <div class="botoes">
            <button class="acao" onclick="limparTudo()">C</button>
            <button class="acao" onclick="apagarUm()">⌫</button>
            <button class="operador" onclick="adicionarValor('/')">/</button>
            <button class="operador" onclick="adicionarValor('*')">×</button>

            <button onclick="adicionarValor('7')">7</button>
            <button onclick="adicionarValor('8')">8</button>
            <button onclick="adicionarValor('9')">9</button>
            <button class="operador" onclick="adicionarValor('-')">-</button>

            <button onclick="adicionarValor('4')">4</button>
            <button onclick="adicionarValor('5')">5</button>
            <button onclick="adicionarValor('6')">6</button>
            <button class="operador" onclick="adicionarValor('+')">+</button>

            <button onclick="adicionarValor('1')">1</button>
            <button onclick="adicionarValor('2')">2</button>
            <button onclick="adicionarValor('3')">3</button>
            <button class="operador" onclick="calcularPorcentagem()">%</button>

            <button class="zero" onclick="adicionarValor('0')">0</button>
            <button onclick="adicionarValor('.')">,</button>
            <button class="igual" onclick="calcular()">=</button>
        </div>

        <footer class="rodape">Feito por Amanda Elizabeth Silva Cruz • Portfólio</footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
